let idx = 0;
let isFlipped = false;
const known = new Set();

function render() {
  const c = cards[idx];
  document.getElementById('qnum').textContent = `Pytanie ${idx + 1} / ${cards.length}`;
  document.getElementById('qtext').textContent = c.q;
  document.getElementById('atext').innerHTML = c.a;
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('meta-right').textContent = `✓ Znane: ${known.size} / ${cards.length}`;
  const pct = ((idx + 1) / cards.length * 100).toFixed(0);
  document.getElementById('pbar').style.width = pct + '%';
  if (isFlipped) { document.getElementById('inner').classList.remove('flipped'); isFlipped = false; }
}

function flip() {
  isFlipped = !isFlipped;
  document.getElementById('inner').classList.toggle('flipped', isFlipped);
}

function go(d) {
  idx = (idx + d + cards.length) % cards.length;
  render();
}

function mark(type) {
  if (type === 'know') { known.add(idx); go(1); }
  else { known.delete(idx); go(1); }
}

function shuffle() {
  idx = Math.floor(Math.random() * cards.length);
  render();
}

function jumpTo() {
  const v = parseInt(document.getElementById('jumpinput').value);
  if (v >= 1 && v <= cards.length) { idx = v - 1; render(); }
}

function resetAll() { known.clear(); idx = 0; render(); }

render();
</script>
